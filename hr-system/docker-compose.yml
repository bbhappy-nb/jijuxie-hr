version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hr-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/hr_system.db:/app/hr_system.db
      - ./backend/uploads:/app/uploads
    environment:
      - DATABASE_URL=sqlite:///./hr_system.db
      - SECRET_KEY=change-this-to-a-random-secret-key
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hr-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
