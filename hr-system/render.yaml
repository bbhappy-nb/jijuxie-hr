services:
  - type: web
    name: jijuxie-hr-system
    env: python
    region: singapore
    buildCommand: bash build.sh
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./hr_system.db
      - key: SECRET_KEY
        value: jijuxie-hr-secret-key-change-me
      - key: PYTHON_VERSION
        value: "3.12"
